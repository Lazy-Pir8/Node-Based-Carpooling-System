<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Trips</title>

<style>
/* (keeping your CSS unchanged for readability) */
body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:linear-gradient(135deg,#f8fafc,#eef2f7);
    margin:40px;
}

h1{
    text-align:center;
    margin-bottom:35px;
    font-weight:600;
    color:#1f2937;
}

.ride-list{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap:20px;
}

.ride{
    background:#ffffff;
    border-radius:14px;
    padding:20px;
    border:1px solid #e5e7eb;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.ride-header{
    font-size:17px;
    font-weight:600;
    color:#111827;
    margin-bottom:10px;
}

.route{
    font-size:14px;
    color:#374151;
    margin-bottom:10px;
}

.time{
    font-size:13px;
    color:#6b7280;
    margin-bottom:12px;
}

.ride-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.price{
    color:#059669;
    font-weight:600;
}

.seats{
    background:#fef3c7;
    color:#92400e;
    font-size:12px;
    padding:6px 10px;
    border-radius:20px;
}

.book-btn{
    margin-top:15px;
    width:100%;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Available Trips</h1>

<div class="ride-list">

{% for tr in trips %}
<div class="ride">

    <div>
        <div class="ride-header">
            {{ tr.name }}
        </div>

        <div class="ride-header">
            Driver:
            <a href="{% url 'users:profile' username=tr.created_by.username %}">
                {{ tr.created_by.username }}
            </a>
        </div>

        <div class="route">
            {{ tr.start_node }} → {{ tr.end_node }}
        </div>

        <div class="time">
            {{ tr.departure_time }} – {{ tr.arrival_time }}
        </div>

        <div class="ride-footer">
            <span class="price">₹{{ tr.ticket_price }}</span>
            <span class="seats">{{ tr.available_seats }} seats</span>
        </div>
    </div>

    <a href="{% url 'trips:trip_detail' slug=tr.slug %}">
        <button class="book-btn">View / Book</button>
    </a>

</div>
{% endfor %}

</div>

<a href="{% url 'trips:index' %}">
    <button>Go Back</button>
</a>

</body>
</html>
