<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Details</title>

<style>
body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:linear-gradient(135deg,#f8fafc,#eef2f7);
    margin:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-weight:600;
    color:#1f2937;
}

.trip-card{
    max-width:800px;
    margin:auto;
    background:#ffffff;
    border-radius:14px;
    padding:35px 40px;
    border:1px solid #e5e7eb;
    box-shadow:0 10px 28px rgba(0,0,0,0.08);
}

.trip-name{
    font-size:20px;
    font-weight:600;
    color:#111827;
    margin-bottom:20px;
}

.route-title{
    font-size:16px;
    font-weight:600;
    margin-bottom:10px;
    color:#374151;
}

.route{
    background:#f9fafb;
    border:1px solid #e5e7eb;
    padding:15px 20px;
    border-radius:10px;
    line-height:1.8;
    font-size:15px;
    color:#374151;
}

.node{
    font-weight:500;
    color:#1f2937;
}

.arrow{
    margin:0 6px;
    color:#6b7280;
}

.book-btn{
    margin-top:25px;
    width:100%;
    background:linear-gradient(135deg,#16a34a,#15803d);
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}
</style>
</head>

<body>

<h1>Trip Details</h1>

<div class="trip-card">

<div class="trip-name">
    Name: {{ trip.name }}
</div>

<div class="route-title">
    Route
</div>
<div> <H3>Current Node: {{ trip.current_node.name }}</H3></div>
<div class="route">

{% for step in route %}
    <span class="node">{{ step.node.name }}</span>
    {% if not forloop.last %}
        <span class="arrow">→</span>
    {% endif %}
{% endfor %}

</div>

<!-- BOOKING FORM -->
<form method="POST" action="{% url 'trips:book_trip' trip.slug %}">
    {% csrf_token %}
    <button type="submit" class="book-btn">Book This Trip</button>
</form>

</div>

</body>
</html>
