<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Create Carpool Request</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Pickup:</label>
        <select name="pickup">
            {% for node in nodes %}
                <option value="{{ node.id }}">{{ node }}</option>
            {% endfor %}
        </select>

        <label>Destination:</label>
        <select name="destination">
            {% for node in nodes %}
                <option value="{{ node.id }}">{{ node }}</option>
            {% endfor %}
        </select>

        <button type="submit">Request Ride</button>
    </form>

    
</body>
</html>
